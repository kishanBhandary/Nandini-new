<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#0F2440"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="50%" style="stop-color:#EF4444"/>
      <stop offset="100%" style="stop-color:#F97316"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.15"/>
  <!-- Gas flame icon -->
  <path d="M256 120 c-20 40-60 70-60 120 c0 45 27 70 60 85 c33-15 60-40 60-85 c0-50-40-80-60-120z" fill="url(#flame)" opacity="0.9"/>
  <path d="M256 180 c-10 25-30 40-30 70 c0 25 14 38 30 45 c16-7 30-20 30-45 c0-30-20-45-30-70z" fill="#FDE68A" opacity="0.8"/>
  <!-- Letter N -->
  <text x="256" y="400" font-family="Arial, Helvetica, sans-serif" font-size="140" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="auto" letter-spacing="-2">N</text>
  <!-- Nandini text -->
  <text x="256" y="445" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="600" fill="#94A3B8" text-anchor="middle" letter-spacing="6">NANDINI</text>
</svg>
